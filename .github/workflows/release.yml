# GitHub Actions workflow to build and release binaries
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      
      - name: Get version and release type
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger - use provided version tag
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE=false
            echo "Creating versioned release: $VERSION"
          else
            # Push to main - use 'latest' prerelease
            VERSION="latest"
            IS_PRERELEASE=true
            echo "Creating rolling 'latest' prerelease"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
      
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME=ctx
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=ctx.exe
          fi
          
          go build -ldflags "-X main.Version=${{ steps.get_version.outputs.VERSION }} -s -w" \
            -o $BINARY_NAME ./cmd/ctx
          
          # Create archive
          ARCHIVE_NAME=ctx_${{ steps.get_version.outputs.VERSION }}_${GOOS}_${GOARCH}
          
          if [ "$GOOS" = "windows" ]; then
            zip ${ARCHIVE_NAME}.zip $BINARY_NAME
            echo "ASSET_PATH=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar czf ${ARCHIVE_NAME}.tar.gz $BINARY_NAME
            echo "ASSET_PATH=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi
      
      - name: Create and push tag for versioned release
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.get_version.outputs.VERSION }} -m "Release ${{ steps.get_version.outputs.VERSION }}"
          git push origin ${{ steps.get_version.outputs.VERSION }}
      
      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          files: ${{ env.ASSET_PATH }}
          prerelease: ${{ steps.get_version.outputs.IS_PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
