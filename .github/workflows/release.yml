# GitHub Actions workflow to build and release binaries
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME=ctx
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=ctx.exe
          fi
          
          go build -ldflags "-X main.Version=${{ steps.version.outputs.VERSION }} -s -w" \
            -o $BINARY_NAME ./cmd/ctx
          
          # Create archive
          ARCHIVE_NAME=ctx_${{ steps.version.outputs.VERSION }}_${GOOS}_${GOARCH}
          
          if [ "$GOOS" = "windows" ]; then
            zip ${ARCHIVE_NAME}.zip $BINARY_NAME
          else
            tar czf ${ARCHIVE_NAME}.tar.gz $BINARY_NAME
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctx_${{ steps.version.outputs.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ctx_${{ steps.version.outputs.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}.*
          retention-days: 7
  
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release-approval
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Determine version and release type
        id: release_info
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE=false
          else
            VERSION="latest"
            IS_PRERELEASE=true
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ctx_${{ steps.release_info.outputs.VERSION }}_*
          merge-multiple: true
      
      - name: Create and push tag for versioned release
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.release_info.outputs.VERSION }} -m "Release ${{ steps.release_info.outputs.VERSION }}"
          git push origin ${{ steps.release_info.outputs.VERSION }}
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_info.outputs.VERSION }}
          files: artifacts/*
          prerelease: ${{ steps.release_info.outputs.IS_PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
